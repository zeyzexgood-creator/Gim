name: Windows VNC Setup

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  setup-windows-vnc:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install VNC Server
      run: |
        # Download TightVNC
        $vncUrl = "https://www.tightvnc.com/download/2.8.59/tightvnc-2.8.59-gpl-setup-64bit.msi"
        $installerPath = "$env:TEMP\tightvnc.msi"
        Invoke-WebRequest -Uri $vncUrl -OutFile $installerPath
        
        # Install TightVNC
        msiexec /i $installerPath /quiet /norestart ADDLOCAL="Server"
        Start-Sleep -Seconds 30
        
        # Configure VNC
        $regPath = "HKLM:\SOFTWARE\TightVNC\Server"
        New-ItemProperty -Path $regPath -Name "Password" -Value "github123" -PropertyType String -Force | Out-Null
        New-ItemProperty -Path $regPath -Name "ControlPassword" -Value "github123" -PropertyType String -Force | Out-Null
        New-ItemProperty -Path $regPath -Name "RfbPort" -Value 5900 -PropertyType DWord -Force | Out-Null
        
        # Start VNC Service
        Start-Service "tvnserver" -ErrorAction SilentlyContinue

    - name: Configure Windows Firewall
      run: |
        # Open VNC port
        New-NetFirewallRule -DisplayName "VNC Server" -Direction Inbound -LocalPort 5900 -Protocol TCP -Action Allow
        New-NetFirewallRule -DisplayName "VNC HTTP" -Direction Inbound -LocalPort 5800 -Protocol TCP -Action Allow

    - name: Enable RDP
      run: |
        # Enable Remote Desktop
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # Create admin user
        $username = "runneradmin"
        $password = ConvertTo-SecureString "GitHub@12345" -AsPlainText -Force
        New-LocalUser -Name $username -Password $password -FullName "GitHub Runner"
        Add-LocalGroupMember -Group "Administrators" -Member $username
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username

    - name: Get Connection Info
      run: |
        # Get public IP
        $ip = (Invoke-RestMethod -Uri "https://api.ipify.org").Trim()
        
        # Create info with here-string - INI YANG DIPERBAIKI
        $info = @'
===========================================
WINDOWS VNC CONNECTION INFORMATION
===========================================
PUBLIC IP: {0}
VNC PORT: 5900
VNC PASSWORD: github123
RDP PORT: 3389
RDP USERNAME: runneradmin
RDP PASSWORD: GitHub@12345

CONNECTION STRINGS:
VNC: vnc://{0}:5900
RDP: mstsc /v:{0}:3389

NOTES:
1. Runner runs max 6 hours
2. Change passwords for security
3. Use VNC or RDP client
'@ -f $ip
        
        # Save and display
        $info | Out-File -FilePath "$env:GITHUB_WORKSPACE\connection-info.txt"
        Write-Output $info

    - name: Keep Alive
      run: |
        Write-Host "Windows VNC is running..."
        Write-Host "IP will be shown above"
        # Keep alive for 1 hour (3600 seconds)
        Start-Sleep -Seconds 3600

    - name: Upload Info
      uses: actions/upload-artifact@v3
      with:
        name: windows-connection
        path: connection-info.txt
