name: Windows VNC Setup

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]

jobs:
  setup-windows-vnc:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install VNC Server
      run: |
        # Download and install TightVNC
        $vncUrl = "https://www.tightvnc.com/download/2.8.59/tightvnc-2.8.59-gpl-setup-64bit.msi"
        $installerPath = "$env:TEMP\tightvnc.msi"
        Invoke-WebRequest -Uri $vncUrl -OutFile $installerPath
        
        # Install TightVNC silently
        msiexec /i $installerPath /quiet /norestart ADDLOCAL="Server" SET_USEVNCAUTHENTICATION=1 VALUE_OF_USEVNCAUTHENTICATION=1 SET_PASSWORD=1 VALUE_OF_PASSWORD=github123 SET_USECONTROLAUTHENTICATION=1 VALUE_OF_USECONTROLAUTHENTICATION=1
        
        # Tunggu instalasi selesai
        Start-Sleep -Seconds 30
        
        # Konfigurasi VNC Server
        $regPath = "HKLM:\SOFTWARE\TightVNC\Server"
        New-ItemProperty -Path $regPath -Name "Password" -Value "github123" -PropertyType String -Force
        New-ItemProperty -Path $regPath -Name "ControlPassword" -Value "github123" -PropertyType String -Force
        New-ItemProperty -Path $regPath -Name "RfbPort" -Value 5900 -PropertyType DWord -Force
        
        # Start VNC Service
        Start-Service "tvnserver"

    - name: Configure Windows Firewall
      run: |
        # Buka port untuk VNC
        New-NetFirewallRule -DisplayName "VNC Server" -Direction Inbound -LocalPort 5900 -Protocol TCP -Action Allow
        New-NetFirewallRule -DisplayName "VNC Server HTTP" -Direction Inbound -LocalPort 5800 -Protocol TCP -Action Allow

    - name: Enable RDP (Remote Desktop)
      run: |
        # Aktifkan Remote Desktop
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        
        # Set password untuk user runner
        $username = "runneradmin"
        $password = ConvertTo-SecureString "GitHub@12345" -AsPlainText -Force
        New-LocalUser -Name $username -Password $password -FullName "GitHub Runner Admin"
        Add-LocalGroupMember -Group "Administrators" -Member $username
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username

    - name: Get Public IP and Create Connection Info
      run: |
        # Dapatkan IP publik
        $ip = (Invoke-RestMethod -Uri "https://api.ipify.org").Trim()
        
        # Buat file dengan informasi koneksi
        $info = @"
===========================================
WINDOWS VNC CONNECTION INFORMATION
===========================================
PUBLIC IP: $ip
VNC PORT: 5900
VNC PASSWORD: github123
RDP PORT: 3389
RDP USERNAME: runneradmin
RDP PASSWORD: GitHub@12345

===========================================
CONNECTION STRINGS:
===========================================
VNC: vnc://$ip:5900
RDP: mstsc /v:$ip:3389

===========================================
NOTES:
===========================================
1. GitHub Actions runner akan berjalan selama 6 jam
2. Port akan terbuka untuk koneksi eksternal
3. Pastikan VNC client sudah terinstall
"@
        
        # Simpan ke file dan tampilkan
        $info | Out-File -FilePath "$env:GITHUB_WORKSPACE\connection-info.txt"
        Write-Output $info

    - name: Keep runner alive
      run: |
        # Script untuk menjaga runner tetap hidup
        $timeout = New-TimeSpan -Hours 6
        $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()
        
        while ($stopwatch.Elapsed -lt $timeout) {
          Write-Output "Runner masih aktif. Waktu tersisa: $($timeout - $stopwatch.Elapsed)"
          Start-Sleep -Seconds 300
        }

    - name: Upload Connection Info
      uses: actions/upload-artifact@v3
      with:
        name: windows-connection-info
        path: connection-info.txt
