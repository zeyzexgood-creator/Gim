<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>AnimeID Streaming</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0b0d10;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow-x: hidden;
        }
        
        #root {
            min-height: 100vh;
        }
        
        /* Loading animation */
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
        
        .animate-loading {
            animation: loading 1.5s infinite linear;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1c22;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #f59e0b;
            border-radius: 10px;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        /* Animations */
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-in {
            animation: fade-in 0.3s ease-out;
        }
        
        @keyframes slide-in-bottom {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .slide-in-bottom {
            animation: slide-in-bottom 0.5s ease-out;
        }
    </style>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.1/dist/umd/lucide.min.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    
    <script>
        // Konfigurasi Firebase - GANTI DENGAN CONFIG ANDA
        window.__firebase_config = JSON.stringify({
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        });
        window.__app_id = "animeid-prod";
        window.__initial_auth_token = "";
    </script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Firebase initialization
        const firebaseConfig = JSON.parse(window.__firebase_config);
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = window.__app_id || 'animeid-prod';
        
        // Helper untuk icons (simulasi lucide-react)
        const Icon = ({ name, size = 24, color = "currentColor", className = "" }) => {
            const icons = {
                home: "M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6",
                search: "M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z",
                history: "M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z",
                user: "M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z",
                play: "M5 3l14 9-14 9V3z",
                star: "M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z",
                "chevron-right": "M9 5l7 7-7 7",
                download: "M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4",
                "check-circle-2": "M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z",
                crown: "M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z",
                x: "M6 18L18 6M6 6l12 12",
                "trash-2": "M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16",
                "loader-2": "M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83",
                info: "M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z",
                "arrow-left": "M10 19l-7-7m0 0l7-7m-7 7h18"
            };
            
            const paths = icons[name] || icons.home;
            
            return React.createElement('svg', {
                xmlns: "http://www.w3.org/2000/svg",
                width: size,
                height: size,
                viewBox: "0 0 24 24",
                fill: "none",
                stroke: color,
                strokeWidth: "2",
                strokeLinecap: "round",
                strokeLinejoin: "round",
                className: className
            }, React.createElement('path', { d: paths }));
        };
        
        // Main App Component
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [user, setUser] = useState(null);
            const [isPremium, setIsPremium] = useState(false);
            const [topAnime, setTopAnime] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [selectedAnime, setSelectedAnime] = useState(null);
            const [history, setHistory] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [isPaying, setIsPaying] = useState(false);
            const [toast, setToast] = useState(null);
            const [quality, setQuality] = useState('720p');
            
            // Auth & Initial Sync
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await auth.signInAnonymously();
                    } catch (err) {
                        console.error("Auth Error:", err);
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => setUser(u));
                return () => unsubscribe();
            }, []);
            
            // Firestore Sync
            useEffect(() => {
                if (!user) return;
                
                // Sync Profile/Premium
                const profileRef = db.doc(`artifacts/${appId}/users/${user.uid}/profile/data`);
                const unsubProfile = profileRef.onSnapshot((docSnap) => {
                    if (docSnap.exists()) {
                        setIsPremium(docSnap.data().isPremium || false);
                    }
                });
                
                // Sync History
                const historyRef = db.collection(`artifacts/${appId}/users/${user.uid}/history`);
                const unsubHistory = historyRef.orderBy('timestamp', 'desc').onSnapshot((snapshot) => {
                    const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setHistory(items);
                });
                
                return () => {
                    unsubProfile();
                    unsubHistory();
                };
            }, [user]);
            
            // API Jikan Fetch
            const fetchTopAnime = async () => {
                setIsLoading(true);
                try {
                    const res = await fetch('https://api.jikan.moe/v4/top/anime?limit=10');
                    const data = await res.json();
                    setTopAnime(data.data || []);
                } catch (err) {
                    showToast("Gagal mengambil data anime", "error");
                } finally {
                    setIsLoading(false);
                }
            };
            
            const handleSearch = async (e) => {
                e.preventDefault();
                if (!searchQuery.trim()) return;
                setIsLoading(true);
                try {
                    const res = await fetch(`https://api.jikan.moe/v4/anime?q=${searchQuery}&limit=12`);
                    const data = await res.json();
                    setSearchResults(data.data || []);
                } catch (err) {
                    showToast("Pencarian gagal", "error");
                } finally {
                    setIsLoading(false);
                }
            };
            
            useEffect(() => {
                fetchTopAnime();
            }, []);
            
            const showToast = (message, type = 'info') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };
            
            const recordView = async (anime) => {
                if (!user) return;
                try {
                    const historyRef = db.collection(`artifacts/${appId}/users/${user.uid}/history`);
                    await historyRef.add({
                        animeId: anime.mal_id,
                        title: anime.title,
                        image: anime.images.webp.image_url,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (err) {
                    console.error(err);
                }
            };
            
            const deleteHistory = async (id) => {
                if (!user) return;
                try {
                    await db.doc(`artifacts/${appId}/users/${user.uid}/history/${id}`).delete();
                    showToast("Riwayat dihapus");
                } catch (err) {
                    showToast("Gagal menghapus", "error");
                }
            };
            
            const simulatePayment = async () => {
                setIsLoading(true);
                setTimeout(async () => {
                    try {
                        const profileRef = db.doc(`artifacts/${appId}/users/${user.uid}/profile/data`);
                        await profileRef.set({ isPremium: true }, { merge: true });
                        setIsPaying(false);
                        setIsPremium(true);
                        showToast("Pembayaran Berhasil! Selamat datang PRO Member.");
                    } catch (err) {
                        showToast("Gagal memproses pembayaran", "error");
                    } finally {
                        setIsLoading(false);
                    }
                }, 2000);
            };
            
            // AnimeCard Component
            const AnimeCard = ({ anime }) => {
                return React.createElement('div', {
                    onClick: () => {
                        setSelectedAnime(anime);
                        recordView(anime);
                    },
                    className: "flex-shrink-0 w-40 cursor-pointer group"
                }, [
                    React.createElement('div', { key: 'img', className: "relative aspect-[3/4] overflow-hidden rounded-2xl bg-gray-800" },
                        React.createElement('img', {
                            src: anime.images.webp.large_image_url,
                            alt: anime.title,
                            className: "w-full h-full object-cover transition duration-300 group-hover:scale-110"
                        }),
                        React.createElement('div', { className: "absolute top-2 right-2 bg-black/60 backdrop-blur-md px-2 py-1 rounded-lg flex items-center gap-1" },
                            React.createElement(Icon, { name: "star", size: 12, color: "#fbbf24" }),
                            React.createElement('span', { className: "text-[10px] font-bold text-white" }, anime.score || 'N/A')
                        )
                    ),
                    React.createElement('h3', { key: 'title', className: "mt-2 text-sm font-bold text-gray-200 line-clamp-2" }, anime.title)
                ]);
            };
            
            // VideoPlayer Component
            const VideoPlayer = ({ anime }) => {
                const isRestricted = quality === '1080p' && !isPremium;
                
                return React.createElement('div', { className: "fixed inset-0 z-50 bg-[#0b0d10] flex flex-col" },
                    React.createElement('div', { className: "p-4 flex items-center justify-between" },
                        React.createElement('button', { onClick: () => setSelectedAnime(null), className: "p-2 bg-white/10 rounded-full" },
                            React.createElement(Icon, { name: "arrow-left", size: 24 })
                        ),
                        React.createElement('div', { className: "text-center flex-1 mx-4" },
                            React.createElement('h2', { className: "text-sm font-black truncate uppercase tracking-tighter" }, anime.title)
                        ),
                        isPremium && React.createElement(Icon, { name: "crown", size: 20, color: "#f59e0b" })
                    ),
                    React.createElement('div', { className: "relative w-full aspect-video bg-black" },
                        isRestricted ? 
                            React.createElement('div', { className: "absolute inset-0 flex flex-col items-center justify-center bg-black/90 p-6 text-center" },
                                React.createElement(Icon, { name: "crown", size: 48, color: "#f59e0b", className: "mb-4 animate-bounce" }),
                                React.createElement('h3', { className: "text-xl font-black mb-2" }, "Kualitas 1080p Khusus PRO"),
                                React.createElement('p', { className: "text-gray-400 text-sm mb-6" }, "Upgrade akun Anda untuk menikmati kualitas visual terbaik dan fitur unduh."),
                                React.createElement('button', {
                                    onClick: () => {
                                        setSelectedAnime(null);
                                        setActiveTab('profile');
                                    },
                                    className: "px-8 py-3 bg-amber-500 rounded-full font-black text-black text-sm uppercase"
                                }, "Upgrade Sekarang")
                            ) :
                            React.createElement('iframe', {
                                src: `https://www.youtube.com/embed/${anime.trailer?.youtube_id || 'dQw4w9WgXcQ'}?autoplay=1`,
                                className: "w-full h-full",
                                allowFullScreen: true
                            })
                    ),
                    React.createElement('div', { className: "flex-1 overflow-y-auto p-4 space-y-6" },
                        React.createElement('div', { className: "flex gap-2 overflow-x-auto pb-2" },
                            ['360p', '720p', '1080p'].map(q => 
                                React.createElement('button', {
                                    key: q,
                                    onClick: () => setQuality(q),
                                    className: `px-4 py-2 rounded-xl text-xs font-black transition ${quality === q ? 'bg-amber-500 text-black' : 'bg-white/10 text-white'}`
                                }, q, q === '1080p' && React.createElement(Icon, { name: "crown", size: 12, className: "inline ml-1" }))
                            )
                        ),
                        React.createElement('div', null,
                            React.createElement('h3', { className: "text-lg font-black mb-2" }, "Sinopsis"),
                            React.createElement('p', { className: "text-gray-400 text-sm leading-relaxed" }, anime.synopsis || "Sinopsis belum tersedia")
                        ),
                        React.createElement('div', null,
                            React.createElement('h3', { className: "text-lg font-black mb-4" }, "Episode"),
                            React.createElement('div', { className: "grid grid-cols-5 gap-2" },
                                [1, 2, 3, 4, 5].map(ep =>
                                    React.createElement('div', { key: ep, className: "aspect-square bg-white/5 rounded-lg flex items-center justify-center font-bold text-gray-500 border border-white/10" }, ep)
                                )
                            )
                        )
                    )
                );
            };
            
            // Bottom Navigation
            const BottomNav = () => {
                const tabs = [
                    { id: 'home', icon: 'home', label: 'Home' },
                    { id: 'search', icon: 'search', label: 'Search' },
                    { id: 'history', icon: 'history', label: 'History' },
                    { id: 'profile', icon: 'user', label: 'Profile' }
                ];
                
                return React.createElement('div', { className: "fixed bottom-0 left-0 right-0 bg-[#0b0d10]/95 backdrop-blur-lg border-t border-white/10 py-2 px-4" },
                    React.createElement('div', { className: "flex justify-around items-center" },
                        tabs.map(tab =>
                            React.createElement('button', {
                                key: tab.id,
                                onClick: () => setActiveTab(tab.id),
                                className: `flex flex-col items-center gap-1 py-2 px-4 rounded-xl transition ${activeTab === tab.id ? 'text-amber-500' : 'text-gray-500'}`
                            },
                                React.createElement(Icon, { name: tab.icon, size: 22 }),
                                React.createElement('span', { className: "text-[10px] font-bold" }, tab.label)
                            )
                        )
                    )
                );
            };
            
            // Toast Notification
            const Toast = () => {
                if (!toast) return null;
                return React.createElement('div', { className: `fixed top-16 left-4 right-4 z-50 p-4 rounded-2xl ${toast.type === 'error' ? 'bg-red-500' : 'bg-amber-500'} text-black font-bold text-center animate-in` },
                    toast.message
                );
            };
            
            // Main Render
            return React.createElement('div', { className: "min-h-screen bg-[#0b0d10] text-white pb-24 overflow-x-hidden" },
                isLoading && React.createElement('div', { className: "fixed top-0 left-0 right-0 h-1 z-[100] overflow-hidden bg-transparent" },
                    React.createElement('div', { className: "h-full bg-amber-500 animate-loading", style: { width: '30%' } })
                ),
                React.createElement('header', { className: "px-6 py-8 flex justify-between items-center" },
                    React.createElement('div', null,
                        React.createElement('h1', { className: "text-3xl font-black tracking-tighter italic" }, "ANIME", React.createElement('span', { className: "text-amber-500 underline decoration-4" }, "ID")),
                        React.createElement('p', { className: "text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1" }, "Streaming Universe")
                    ),
                    isPremium && React.createElement('div', { className: "bg-amber-500/10 border border-amber-500/50 px-3 py-1 rounded-full flex items-center gap-2" },
                        React.createElement(Icon, { name: "crown", size: 14, color: "#f59e0b" }),
                        React.createElement('span', { className: "text-[10px] font-black text-amber-500" }, "PRO MEMBER")
                    )
                ),
                React.createElement('main', { className: "px-6" },
                    activeTab === 'home' && React.createElement('div', { className: "space-y-8 animate-in" },
                        React.createElement('section', { className: "relative h-48 rounded-3xl overflow-hidden bg-gradient-to-br from-amber-600 to-amber-900 flex items-center p-8" },
                            React.createElement('div', { className: "relative z-10 space-y-2" },
                                React.createElement('h2', { className: "text-2xl font-black leading-tight" }, "Nonton Anime", React.createElement('br', null), "Tanpa Iklan."),
                                React.createElement('button', {
                                    onClick: () => setActiveTab('profile'),
                                    className: "px-4 py-2 bg-black text-white rounded-xl text-xs font-black uppercase tracking-tight"
                                }, "Dapatkan Akses PRO")
                            ),
                            React.createElement(Icon, { name: "crown", size: 192, color: "rgba(255,255,255,0.1)", className: "absolute right-[-20px] bottom-[-20px] -rotate-12" })
                        ),
                        React.createElement('section', null,
                            React.createElement('div', { className: "flex justify-between items-end mb-4" },
                                React.createElement('h2', { className: "text-xl font-black tracking-tight" }, "Terpopuler"),
                                React.createElement('span', { className: "text-xs font-bold text-amber-500" }, "Lihat Semua")
                            ),
                            React.createElement('div', { className: "flex gap-4 overflow-x-auto pb-2" },
                                topAnime.length > 0 ? topAnime.map(anime => React.createElement(AnimeCard, { key: anime.mal_id, anime: anime })) :
                                    [1,2,3].map(i => React.createElement('div', { key: i, className: "w-40 h-56 bg-white/5 rounded-2xl animate-pulse" }))
                            )
                        )
                    ),
                    activeTab === 'search' && React.createElement('div', { className: "animate-in" },
                        React.createElement('form', { onSubmit: handleSearch, className: "mb-8" },
                            React.createElement('div', { className: "relative" },
                                React.createElement('input', {
                                    type: "text",
                                    placeholder: "Cari anime favorit...",
                                    className: "w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 focus:outline-none focus:border-amber-500 transition font-bold text-white",
                                    value: searchQuery,
                                    onChange: (e) => setSearchQuery(e.target.value)
                                }),
                                React.createElement(Icon, { name: "search", size: 20, color: "#6b7280", className: "absolute left-4 top-1/2 -translate-y-1/2" })
                            )
                        ),
                        React.createElement('div', { className: "grid grid-cols-2 gap-4" },
                            searchResults.map(anime => React.createElement(AnimeCard, { key: anime.mal_id, anime: anime })),
                            searchResults.length === 0 && !isLoading && React.createElement('div', { className: "col-span-2 text-center py-20 opacity-30" },
                                React.createElement(Icon, { name: "search", size: 48, className: "mx-auto mb-4" }),
                                React.createElement('p', { className: "font-bold" }, "Mulai cari petualanganmu")
                            )
                        )
                    ),
                    activeTab === 'history' && React.createElement('div', { className: "animate-in" },
                        React.createElement('h2', { className: "text-2xl font-black mb-6" }, "Terakhir Ditonton"),
                        React.createElement('div', { className: "space-y-4" },
                            history.map(item => 
                                React.createElement('div', { key: item.id, className: "flex gap-4 bg-white/5 p-3 rounded-2xl items-center border border-white/5 group" },
                                    React.createElement('img', { src: item.image, className: "w-16 h-20 object-cover rounded-xl" }),
                                    React.createElement('div', { className: "flex-1 min-w-0" },
                                        React.createElement('h3', { className: "font-bold text-sm truncate" }, item.title),
                                        React.createElement('p', { className: "text-[10px] text-gray-500 mt-1 uppercase font-black" },
                                            item.timestamp ? new Date(item.timestamp.seconds * 1000).toLocaleDateString() : 'Baru saja'
                                        )
                                    ),
                                    React.createElement('button', {
                                        onClick: () => deleteHistory(item.id),
                                        className: "p-2 text-gray-600 hover:text-red-500 transition"
                                    }, React.createElement(Icon, { name: "trash-2", size: 18 }))
                                )
                            ),
                            history.length === 0 && React.createElement('div', { className: "text-center py-20 opacity-30" },
                                React.createElement(Icon, { name: "history", size: 48, className: "mx-auto mb-4" }),
                                React.createElement('p', { className: "font-bold" }, "Belum ada riwayat")
                            )
                        )
                    ),
                    activeTab === 'profile' && React.createElement('div', { className: "animate-in space-y-8" },
                        React.createElement('div', { className: "flex items-center gap-6 bg-white/5 p-6 rounded-3xl border border-white/5" },
                            React.createElement('div', { className: "w-20 h-20 rounded-full bg-gradient-to-tr from-amber-500 to-yellow-300 flex items-center justify-center" },
                                React.createElement(Icon, { name: "user", size: 40, color: "#000000" })
                            ),
                            React.createElement('div', null,
                                React.createElement('h2', { className: "text-xl font-black" }, "User ID: ", user?.uid?.substring(0, 8) || "Guest", "..."),
                                React.createElement('p', { className: "text-amber-500 text-sm font-bold" }, isPremium ? 'PRO Member Active' : 'Free Member')
                            )
                        ),
                        !isPremium && React.createElement('div', { className: "bg-gradient-to-br from-indigo-900 to-purple-900 p-8 rounded-[2rem] relative overflow-hidden" },
                            React.createElement('div', { className: "relative z-10" },
